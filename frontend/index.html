<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Драйвиум — Аналитика</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #FBFBFB; overflow: hidden; }
        
        .sidebar { width: 280px; height: 100vh; background: #FBFBFB; border-right: 1px solid #F1F3F4; display: flex; flex-direction: column; }
        
        /* Навигация */
        .nav-container { flex-grow: 1; overflow-y: auto; }
        .nav-item { 
            display: flex; align-items: center; gap: 12px; padding: 12px 16px; 
            border-radius: 12px; cursor: pointer; color: #5F6368; font-size: 14px; 
            margin-bottom: 4px; transition: all 0.2s;
        }
        .nav-item:hover { background: #F1F3F4; color: #2D2D2D; }
        .nav-item.active { background: #E8F5E9; color: #2E7D32; font-weight: 600; }
        
        /* Кнопка нового запроса */
        .btn-new-query {
            border: 1px solid #DADCE0; border-radius: 12px; padding: 14px;
            display: flex; align-items: center; gap: 10px; width: 100%;
            font-size: 14px; margin-bottom: 30px; background: white; font-weight: 500;
        }

        /* Чат и рабочая область */
        .chat-area { 
            flex: 1; display: flex; flex-direction: column; 
            background: white; border-radius: 32px 0 0 0; 
            border-left: 1px solid #F1F3F4; border-top: 1px solid #F1F3F4;
            box-shadow: -10px 0 30px rgba(0,0,0,0.02);
        }

        /* Поле ввода */
        .input-wrapper {
            max-width: 900px; margin: 0 auto; width: 100%; position: relative;
        }
        .input-container {
            border: 1px solid #DADCE0; border-radius: 24px; padding: 10px 10px 10px 24px;
            display: flex; align-items: center; background: white;
        }
        .query-input { flex: 1; border: none; outline: none; font-size: 16px; height: 50px; }
        .btn-send { 
            background: #A5F52C; width: 48px; height: 48px; border-radius: 16px; 
            display: flex; align-items: center; justify-content: center; 
            flex-shrink: 0; margin-left: 12px;
        }

        /* Промо и нижние кнопки */
        .sidebar-bottom { padding: 16px 0; border-top: 1px solid #F1F3F4; }
        .promo-img { width: 100%; border-radius: 16px; margin-top: 16px; cursor: pointer; }
    </style>
</head>
<body class="flex h-screen">

    <aside class="sidebar p-6">
        <div class="mb-10 px-2">
            <img src="logo.png" alt="Drivee" class="h-10"> </div>

        <button class="btn-new-query" onclick="showScreen('main')">
            <i data-lucide="edit-3" class="w-5 h-5 text-gray-400"></i>
            <span>Новый запрос</span>
        </button>

        <nav class="nav-container">
            <div onclick="handleNav(this, 'main')" class="nav-item active">
                <i data-lucide="home" class="w-5 h-5"></i><span>Главная</span>
            </div>
            <div onclick="handleNav(this, 'history')" class="nav-item">
                <i data-lucide="clock" class="w-5 h-5"></i><span>История запросов</span>
            </div>
            <div class="nav-item">
                <i data-lucide="star" class="w-5 h-5"></i><span>Избранное</span>
            </div>
            <div onclick="handleNav(this, 'dashboards')" class="nav-item">
                <i data-lucide="layout" class="w-5 h-5"></i><span>Дашборды</span>
            </div>
            <div onclick="handleNav(this, 'database')" class="nav-item">
                <i data-lucide="database" class="w-5 h-5"></i><span>База данных</span>
            </div>
            <div class="nav-item">
                <i data-lucide="settings" class="w-5 h-5"></i><span>Настройки</span>
            </div>
        </nav>

        <div class="sidebar-bottom">
            <div class="nav-item"><i data-lucide="help-circle" class="w-5 h-5"></i><span>Помощь</span></div>
            <div onclick="logout()" class="nav-item"><i data-lucide="log-out" class="w-5 h-5"></i><span>Выйти</span></div>
            <img src="analitycs_for_all.png" alt="Промо" class="promo-img"> </div>
    </aside>

    <main class="flex-1 flex flex-col">
        <header class="h-20 flex items-center justify-between px-10">
            <div class="flex items-center gap-3">
                <i data-lucide="sparkles" class="w-6 h-6 text-green-500"></i>
                <h1 id="screen-title" class="text-lg font-bold">Драйвиум — Аналитическая платформа</h1>
            </div>
            
            <div class="flex items-center gap-4">
                <div class="flex items-center gap-2 cursor-pointer">
                    <div id="avatar" class="w-10 h-10 rounded-full bg-[#A5F52C] flex items-center justify-center font-bold">Ж</div>
                    <span id="userName" class="font-medium text-sm">Жанна</span>
                    <i data-lucide="chevron-down" class="w-4 h-4 text-gray-400"></i>
                </div>
            </div>
        </header>

        <div class="flex-1 flex overflow-hidden">
            <section class="chat-area">
                <div id="main-content" class="flex-1 overflow-y-auto p-10 flex flex-col">
                    </div>

                <div id="input-zone" class="p-8">
                    <div class="input-wrapper space-y-4">
                        <div class="input-container">
                            <input id="queryInput" type="text" placeholder="Напишите ваш запрос..." class="query-input">
                            <button onclick="sendQuery()" class="btn-send hover:brightness-105 transition-all">
                                <i data-lucide="send" class="w-5 h-5 text-black"></i>
                            </button>
                        </div>
                        <div class="flex gap-3">
                            <div class="px-4 py-2 border border-gray-100 rounded-xl text-xs text-gray-500 flex items-center gap-2 cursor-pointer hover:bg-gray-50">
                                <i data-lucide="sparkles" class="w-3 h-3"></i> Примеры запросов
                            </div>
                            <div class="px-4 py-2 border border-gray-100 rounded-xl text-xs text-gray-500 flex items-center gap-2 cursor-pointer hover:bg-gray-50">
                                <i data-lucide="upload-cloud" class="w-3 h-3"></i> Загрузить файл
                            </div>
                        </div>
                    </div>
                </div>
            </section>

            <aside id="right-panel" class="w-[340px] p-8 hidden xl:block bg-white">
                </aside>
        </div>
    </main>

    <script src="app.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
