<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Драйвиум</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-white">
    <div class="app-layout">
        <aside class="sidebar">
            <div class="sidebar-top">
                <img src="logo.png" alt="Drivee" class="main-logo">
                
                <button class="new-query-btn" onclick="clearChat()">
                    <i data-lucide="plus" class="w-4 h-4"></i>
                    <span>Новый запрос</span>
                </button>

                <nav class="menu">
                    <a href="#" class="menu-item active"><i data-lucide="home"></i> Главная</a>
                    <a href="#" class="menu-item"><i data-lucide="history"></i> История</a>
                    <a href="#" class="menu-item"><i data-lucide="database"></i> Данные</a>
                </nav>
            </div>

            <div class="sidebar-bottom">
                <img src="analitycs_for_all.png" alt="Promo" class="promo-banner">
                <button onclick="logout()" class="logout-link">
                    <i data-lucide="log-out"></i> Выйти
                </button>
            </div>
        </aside>

        <main class="main-area">
            <header class="header">
                <img src="header.png" alt="Драйвиум" class="header-title-img">
                
                <div class="user-block">
                    <div id="userAvatar" class="avatar">?</div>
                    <span id="userNameDisplay" class="username">...</span>
                </div>
            </header>

            <div id="chatMessages" class="chat-viewport"></div>

            <footer class="footer-input">
                <div class="input-box">
                    <textarea id="queryInput" placeholder="Напишите ваш запрос..."></textarea>
                    <div class="input-row">
                        <span class="engine-tag">SQL AI ENGINE V1.2</span>
                        <button onclick="sendQuery()" class="send-btn">
                            <i data-lucide="arrow-up-right"></i>
                        </button>
                    </div>
                </div>
            </footer>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
