<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Drivee Аналитика</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .sidebar-active { background-color: #F7FEE7; border: 2px solid #A5F52C; }
        .drivee-green { color: #A5F52C; }
    </style>
</head>
<body class="bg-gray-50 flex h-screen overflow-hidden text-[#2D2D2D]">

    <aside class="w-72 bg-white border-r-2 border-gray-100 flex flex-col p-6">
        <div class="mb-10 text-2xl font-bold italic px-2">drive<span class="drivee-green">ee</span></div>
        <nav class="flex-1 space-y-3">
            <button class="w-full flex items-center p-4 border-2 border-[#A5F52C] rounded-2xl font-bold hover:bg-[#F7FEE7] transition-all">
                <i data-lucide="plus-circle" class="mr-3 w-5 h-5 drivee-green"></i>Новый запрос
            </button>
            <div class="flex items-center p-4 sidebar-active rounded-2xl font-bold"><i data-lucide="home" class="mr-3 w-5 h-5"></i>Главная</div>
            <div class="flex items-center p-4 text-gray-400 hover:bg-gray-50 rounded-2xl cursor-pointer border border-transparent hover:border-gray-200 transition-all">
                <i data-lucide="history" class="mr-3 w-5 h-5"></i>История
            </div>
            <div class="flex items-center p-4 text-gray-400 hover:bg-gray-50 rounded-2xl cursor-pointer border border-transparent hover:border-gray-200 transition-all">
                <i data-lucide="database" class="mr-3 w-5 h-5"></i>База данных
            </div>
        </nav>
        <button onclick="logout()" class="flex items-center p-4 text-gray-400 hover:text-red-500 transition-colors">
            <i data-lucide="log-out" class="mr-3 w-5 h-5"></i>Выйти
        </button>
    </aside>

    <main class="flex-1 overflow-y-auto p-10">
        <header class="flex justify-between items-center mb-12">
            <div class="flex items-center text-sm font-semibold text-gray-400 border border-gray-200 px-4 py-2 rounded-full">
                <i data-lucide="sparkles" class="w-4 h-4 drivee-green mr-2"></i> Драйвиум — AI Аналитика
            </div>
            <div class="flex items-center gap-3">
                <div id="avatar" class="w-10 h-10 bg-[#A5F52C] rounded-full flex items-center justify-center font-bold text-white border-2 border-white shadow-sm">?</div>
                <span id="userName" class="font-bold text-gray-700">Пользователь</span>
            </div>
        </header>

        <div class="max-w-4xl mx-auto">
            <h1 class="text-5xl font-bold mb-6">Спросил — получил — <span class="drivee-green">решил</span></h1>
            
            <div class="bg-white border-2 border-gray-100 rounded-[32px] p-8 shadow-lg mb-10">
                <textarea id="queryInput" class="w-full h-32 outline-none text-xl placeholder-gray-200 resize-none" placeholder="Напишите ваш запрос..."></textarea>
                <div class="flex justify-between items-center mt-6 pt-6 border-t border-gray-50">
                    <div class="flex gap-2">
                        <button class="px-4 py-2 bg-gray-50 border border-gray-200 rounded-xl text-xs font-bold hover:bg-gray-100 transition-all">✨ ПРИМЕРЫ</button>
                        <button class="px-4 py-2 bg-gray-50 border border-gray-200 rounded-xl text-xs font-bold hover:bg-gray-100 transition-all">📁 ФАЙЛ</button>
                    </div>
                    <button id="sendBtn" onclick="askML()" class="bg-[#A5F52C] p-5 rounded-2xl hover:scale-105 active:scale-95 transition-all border-b-4 border-[#8ed426]">
                        <i data-lucide="send" class="w-6 h-6 text-white"></i>
                    </button>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div onclick="useText('Покажи продажи по регионам')" class="p-6 border-2 border-gray-100 rounded-3xl hover:border-[#A5F52C] hover:bg-white cursor-pointer transition-all flex items-center group shadow-sm">
                    <div class="w-12 h-12 bg-gray-50 border border-gray-100 rounded-2xl flex items-center justify-center mr-4 group-hover:border-[#A5F52C]"><i data-lucide="bar-chart-3" class="w-6 h-6"></i></div>
                    <span class="text-sm font-bold">Продажи по регионам</span>
                </div>
                <div onclick="useText('Самые прибыльные заказы')" class="p-6 border-2 border-gray-100 rounded-3xl hover:border-[#A5F52C] hover:bg-white cursor-pointer transition-all flex items-center group shadow-sm">
                    <div class="w-12 h-12 bg-gray-50 border border-gray-100 rounded-2xl flex items-center justify-center mr-4 group-hover:border-[#A5F52C]"><i data-lucide="shopping-bag" class="w-6 h-6"></i></div>
                    <span class="text-sm font-bold">Прибыльные заказы</span>
                </div>
            </div>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
