<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drivee Analytics | Panel</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

<div class="app-container">
    
    <aside class="sidebar">
        <div class="sidebar-top">
            <div class="logo-wrapper">
                <img src="logo.png" alt="Drivee">
            </div>

            <button class="btn-new" onclick="clearChat(); showView('Главная')">
                <i data-lucide="plus"></i>
                Новый запрос
            </button>

            <nav class="nav">
                <div class="nav-item active">
                    <i data-lucide="layout-dashboard"></i>
                    Главная
                </div>
                <div class="nav-item">
                    <i data-lucide="history"></i>
                    История
                </div>
                <div class="nav-item">
                    <i data-lucide="database"></i>
                    Данные
                </div>
            </nav>
        </div>

        <div class="sidebar-bottom">
            <div class="logout" onclick="logout()">
                <i data-lucide="log-out"></i>
                Выйти
            </div>
            <div class="promo-wrapper">
                <img src="promo_block.png" alt="Promo" class="promo-img">
            </div>
        </div>
    </aside>

    <main class="main-content">
        
        <header class="header">
            <img src="header.png" alt="Header Background" class="header-bg">
            <div class="header-content">
                <div class="user-block">
                    <div class="avatar" id="avatar">A</div>
                    <span class="user-name" id="userName">Admin</span>
                </div>
            </div>
        </header>

        <div class="workspace">
            
            <section class="chat-container" id="mainView">
                <div class="chat-viewport" id="chatMessages"></div>
                <div class="footer">
                    <div class="input-card">
                        <textarea id="queryInput" placeholder="Спросите AI о данных Drivee..."></textarea>
                        <div class="input-actions">
                            <div class="engine-info">SQL ENGINE v1.0</div>
                            <button class="send-btn" onclick="sendQuery()">
                                <i data-lucide="arrow-up"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </section>

            <section id="historyView" class="view-section hidden">
                <div class="section-content">
                    <div class="view-header">
                        <h2>История запросов</h2>
                    </div>
                    <div class="list-container" id="historyList"></div>
                </div>
            </section>

            <section id="dataView" class="view-section hidden">
                <div class="section-content">
                    <div class="view-header">
                        <h2>Базы данных</h2>
                    </div>
                    <div class="list-container" id="dbList"></div>
                </div>
            </section>

            <aside class="right-panel">
                <div class="side-box">
                    <div class="box-title">Статистика</div>
                    <div class="stat-item" id="statRequests">Запросов сегодня: 0</div>
                    <div class="stat-item">Точность: 98%</div>
                </div>
                <div class="side-box">
                    <div class="box-title">Статус</div>
                    <div class="status-online">
                        <span class="dot"></span> SQL Engine Online
                    </div>
                </div>
            </aside>
        </div>
    </main>
</div>

<script src="app.js"></script>
</body>
</html>
