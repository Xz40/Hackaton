<body class="bg-[#F3F4F6] flex h-screen overflow-hidden text-gray-800">
    <aside class="w-64 bg-white border-r border-gray-100 flex flex-col p-6">
        <div class="flex items-center gap-3 mb-10 px-2">
            <div class="w-8 h-8 bg-[#A5F52C] rounded-lg flex items-center justify-center">
                <i data-lucide="database" class="w-5 h-5 text-black"></i>
            </div>
            <span class="font-bold text-xl tracking-tight">Drivee <span class="text-gray-400 font-medium">Data</span></span>
        </div>

        <nav class="space-y-2 flex-1">
            <button onclick="handleNav(this, 'main')" class="nav-item active w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all">
                <i data-lucide="message-square" class="w-5 h-5"></i> <span class="font-semibold text-sm">Аналитик</span>
            </button>
            <button onclick="handleNav(this, 'history')" class="nav-item w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all">
                <i data-lucide="history" class="w-5 h-5"></i> <span class="font-semibold text-sm">История</span>
            </button>
            <button onclick="handleNav(this, 'database')" class="nav-item w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all">
                <i data-lucide="layout-grid" class="w-5 h-5"></i> <span class="font-semibold text-sm">Заказы</span>
            </button>
        </nav>

        <div class="mt-auto p-4 bg-gray-50 rounded-2xl flex items-center gap-3">
            <div id="avatar" class="w-10 h-10 bg-[#A5F52C] rounded-full flex items-center justify-center font-bold text-sm">A</div>
            <div class="overflow-hidden">
                <p id="userName" class="text-xs font-bold truncate">Admin</p>
                <button onclick="logout()" class="text-[10px] text-red-400 font-bold hover:text-red-600 uppercase tracking-tighter">Выйти</button>
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col relative overflow-hidden">
        <header class="h-20 bg-white border-b border-gray-100 flex items-center justify-between px-8">
            <h2 id="screen-title" class="font-bold text-lg">Интеллектуальный чат</h2>
            <div class="flex items-center gap-4">
                <span class="text-[10px] bg-green-50 text-green-600 px-3 py-1 rounded-full font-bold uppercase tracking-widest">Система активна</span>
            </div>
        </header>

        <div id="main-content" class="flex-1 flex flex-col overflow-hidden bg-[#FBFBFB]">
            </div>
    </main>

    <style>
        .nav-item { color: #9CA3AF; }
        .nav-item.active { background-color: #F3F4F6; color: #111827; }
        .nav-item:hover:not(.active) { color: #111827; background-color: #F9FAFB; }
        
        .chat-container { scroll-behavior: smooth; }
        .message { max-width: 75%; padding: 1.25rem; border-radius: 1.5rem; margin-bottom: 1.5rem; line-height: 1.5; font-size: 0.95rem; }
        .user-message { background-color: #A5F52C; color: black; align-self: flex-end; border-bottom-right-radius: 0.25rem; margin-right: 2rem; box-shadow: 0 4px 15px rgba(165, 245, 44, 0.2); }
        .bot-message { background-color: white; color: #1F2937; align-self: flex-start; border-bottom-left-radius: 0.25rem; border: 1px solid #F3F4F6; margin-left: 2rem; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.02); }
    </style>
</body>
