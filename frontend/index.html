<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Драйвиум — Аналитическая платформа</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { background-color: #FBFBFB; font-family: 'Inter', sans-serif; color: #2D2D2D; margin: 0; }
        .sidebar { width: 280px; border-right: 1px solid rgba(0,0,0,0.08); background: #FBFBFB; }
        .nav-item { display: flex; align-items: center; gap: 14px; padding: 12px 18px; border-radius: 14px; transition: all 0.2s; color: #5F6368; font-weight: 500; font-size: 15px; }
        .nav-item:hover { background: #f0f0f0; }
        .nav-item.active { background: #E9F7D0; color: #2D2D2D; }
        .icon-container { width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .icon { width: 20px; height: 20px; stroke: currentColor; stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; }
        .chat-container { max-width: 900px; margin: 0 auto; width: 100%; }
        .card { background: white; border-radius: 24px; border: 1px solid rgba(0,0,0,0.08); }
        .input-area { background: white; border: 1px solid rgba(0,0,0,0.12); border-radius: 20px; padding: 16px; }
        .btn-send { background-color: #A5F52C; border-radius: 12px; padding: 12px; transition: all 0.2s; display: flex; align-items: center; justify-content: center; }
        .btn-send:hover { transform: scale(1.05); filter: brightness(1.05); }
        .promo-banner { background: #A5F52C; border-radius: 20px; padding: 20px; position: relative; overflow: hidden; }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <aside class="sidebar flex flex-col p-6 h-full">
        <img src="logo.png" alt="Drivee" class="h-11 w-auto self-start mb-10 ml-2"> 
        <button class="w-full border border-gray-200 py-3.5 rounded-xl flex items-center justify-center gap-2 mb-8 hover:bg-gray-50 transition-all font-semibold text-sm">
            <div class="icon-container"><svg class="icon" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></div>
            Новый запрос
        </button>

        <nav class="flex-1 space-y-1">
            <a href="#" class="nav-item active">
                <div class="icon-container"><svg class="icon" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></div>
                Главная
            </a>
            <a href="#" class="nav-item">
                <div class="icon-container"><svg class="icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div>
                История запросов
            </a>
            <a href="#" class="nav-item">
                <div class="icon-container"><svg class="icon" viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg></div>
                Избранное
            </a>
            <a href="#" class="nav-item">
                <div class="icon-container"><svg class="icon" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg></div>
                Дашборды
            </a>
            <a href="#" class="nav-item">
                <div class="icon-container"><svg class="icon" viewBox="0 0 24 24"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg></div>
                База данных
            </a>
            <a href="#" class="nav-item">
                <div class="icon-container"><svg class="icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></div>
                Настройки
            </a>
        </nav>

        <div class="mt-auto space-y-4">
            <a href="#" class="nav-item">
                <div class="icon-container"><svg class="icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg></div>
                Помощь
            </a>
            <a href="login.html" onclick="localStorage.clear()" class="nav-item text-red-500">
                <div class="icon-container"><svg class="icon" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></div>
                Выйти
            </a>
            <div class="promo-banner mt-4">
                <p class="font-bold text-sm text-[#2D2D2D]">Аналитика</p>
                <p class="text-[11px] text-[#2D2D2D] opacity-70">доступна каждому</p>
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col">
        <header class="h-16 flex items-center justify-between px-8 bg-white border-b border-gray-100">
            <div class="flex items-center gap-2 text-sm font-semibold opacity-80">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#A5F52C" stroke-width="2.5"><path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z"/></svg>
                Драйвиум — Интеллектуальная аналитическая платформа
            </div>
            <div class="flex items-center gap-3">
                <div id="userAvatar" class="w-8 h-8 bg-[#A5F52C] rounded-full flex items-center justify-center font-bold text-xs">?</div>
                <span id="userNameDisplay" class="font-medium text-sm">Пользователь</span>
                <span class="text-[10px] opacity-40">▼</span>
            </div>
        </header>

        <div class="flex-1 flex p-8 gap-8 overflow-hidden">
            <div class="flex-1 flex flex-col">
                <div id="chatMessages" class="flex-1 overflow-y-auto chat-container space-y-6 pr-4"></div>
                <div class="chat-container pt-6">
                    <div class="input-area shadow-sm">
                        <textarea id="userInput" rows="1" placeholder="Напишите ваш запрос..." class="w-full outline-none resize-none text-sm"></textarea>
                        <div class="flex justify-between items-center mt-4">
                            <div class="flex gap-2">
                                <button class="text-[12px] border px-4 py-2 rounded-xl text-gray-500 hover:bg-gray-50 transition-colors flex items-center gap-2">
                                    <div class="icon-container w-3 h-3"><svg class="icon" viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg></div>
                                    Примеры запросов
                                </button>
                                <button class="text-[12px] border px-4 py-2 rounded-xl text-gray-500 hover:bg-gray-50 transition-colors flex items-center gap-2">
                                    <div class="icon-container w-3 h-3"><svg class="icon" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg></div>
                                    Загрузить файл
                                </button>
                            </div>
                            <button class="btn-send" id="sendBtn">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#2D2D2D" stroke-width="2.5"><path d="M22 2L11 13M22 2L15 22L11 13M11 13L2 9L22 2"/></svg>
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="w-80 space-y-6">
                <div class="card p-6">
                    <h3 class="font-bold text-sm mb-6">Быстрые действия</h3>
                    <div class="space-y-4">
                        <div class="flex items-center justify-between group cursor-pointer">
                            <div class="flex items-center gap-3">
                                <span class="bg-[#E9F7D0] p-2.5 rounded-xl"><div class="icon-container w-4 h-4 text-green-700"><svg class="icon" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg></div></span>
                                <div class="text-left">
                                    <p class="text-xs font-semibold">Создать дашборд</p>
                                    <p class="text-[10px] text-gray-400">Визуализируйте метрики</p>
                                </div>
                            </div>
                            <svg class="icon w-3 h-3 text-gray-300 group-hover:text-gray-900" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
                        </div>
                        <div class="flex items-center justify-between group cursor-pointer">
                            <div class="flex items-center gap-3">
                                <span class="bg-[#E9F7D0] p-2.5 rounded-xl"><div class="icon-container w-4 h-4 text-green-700"><svg class="icon" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></div></span>
                                <div class="text-left">
                                    <p class="text-xs font-semibold">Подключить данные</p>
                                    <p class="text-[10px] text-gray-400">Добавить базу данных</p>
                                </div>
                            </div>
                            <svg class="icon w-3 h-3 text-gray-300 group-hover:text-gray-900" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // Инициализация пользователя
        const userName = localStorage.getItem('drivee_user') || 'Пользователь';
        document.getElementById('userNameDisplay').innerText = userName;
        document.getElementById('userAvatar').innerText = userName.charAt(0).toUpperCase();

        if (!localStorage.getItem('drivee_user')) {
            window.location.href = 'login.html';
        }

        // Логика чата
        const chatMessages = document.getElementById('chatMessages');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');

        function appendMessage(text, isUser = true) {
            const msgDiv = document.createElement('div');
            msgDiv.className = isUser ? 'flex justify-end mb-4' : 'flex justify-start mb-4';
            const innerClass = isUser 
                ? 'bg-[#E9F7D0] text-[#2D2D2D] rounded-[18px] rounded-br-[4px] p-4 max-w-[80%] shadow-sm' 
                : 'bg-white border border-gray-100 text-[#2D2D2D] rounded-[18px] rounded-bl-[4px] p-4 max-w-[80%] shadow-sm';

            msgDiv.innerHTML = `
                <div class="${innerClass}">
                    <p class="text-sm leading-relaxed">${text}</p>
                    <div class="text-[10px] opacity-40 mt-2 text-right">
                        ${new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})} ${isUser ? '✓✓' : ''}
                    </div>
                </div>
            `;
            chatMessages.appendChild(msgDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function appendLoader() {
            const loader = document.createElement('div');
            loader.id = 'temp-loader';
            loader.className = 'flex justify-start mb-4';
            loader.innerHTML = `
                <div class="bg-white border border-gray-100 rounded-[18px] p-4 shadow-sm">
                    <div class="flex gap-1">
                        <div class="w-1.5 h-1.5 bg-[#A5F52C] rounded-full animate-bounce"></div>
                        <div class="w-1.5 h-1.5 bg-[#A5F52C] rounded-full animate-bounce [animation-delay:0.2s]"></div>
                        <div class="w-1.5 h-1.5 bg-[#A5F52C] rounded-full animate-bounce [animation-delay:0.4s]"></div>
                    </div>
                </div>
            `;
            chatMessages.appendChild(loader);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        async function handleSendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            appendMessage(text, true);
            userInput.value = '';
            userInput.style.height = 'auto';
            appendLoader();

            try {
                const response = await fetch('http://78.36.198.54:8080/ask', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        question: text,
                        user_id: userName 
                    })
                });
                const data = await response.json();
                document.getElementById('temp-loader').remove();
                
                // Обработка ответа от бэкенда (предполагаем поле data.answer или data.message)
                appendMessage(data.answer || data.message || "Запрос обработан", false);
            } catch (error) {
                console.error("Ошибка бека:", error);
                if(document.getElementById('temp-loader')) document.getElementById('temp-loader').remove();
                appendMessage("Ошибка связи с сервером. Проверь, запущен ли питон.", false);
            }
        }

        sendBtn.addEventListener('click', handleSendMessage);
        userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                handleSendMessage();
            }
        });

        userInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
        });
    </script>
</body>
</html>
