<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drivee Analytics | Система управления данными</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #F3F4F6; }
        .message { max-width: 80%; padding: 1rem; border-radius: 1.5rem; margin-bottom: 1rem; }
        .user-message { background-color: #A5F52C; color: black; align-self: flex-end; border-bottom-right-radius: 0.2rem; }
        .bot-message { background-color: white; color: #1F2937; align-self: flex-start; border-bottom-left-radius: 0.2rem; border: 1px solid #E5E7EB; }
        .chat-container { display: flex; flex-direction: column; height: calc(100vh - 450px); overflow-y: auto; padding: 1.5rem; }
        .nav-item.active { background-color: #E5E7EB; color: black; }
        .nav-item.active i { color: #A5F52C; }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <aside class="w-20 lg:w-64 bg-white border-r flex flex-col py-6 px-4">
        <div class="flex items-center gap-3 px-2 mb-10">
            <img src="logo.png" alt="Drivee Logo" class="w-10 h-10 object-contain rounded-lg">
            <span class="font-bold text-xl hidden lg:block tracking-tight">Drivee Pay</span>
        </div>

        <nav class="flex-1 space-y-1">
            <div onclick="handleNav(this, 'main')" class="nav-item active flex items-center gap-4 p-3 rounded-xl cursor-pointer hover:bg-gray-50 transition-all">
                <i data-lucide="message-square"></i><span class="hidden lg:block font-semibold">Аналитик</span>
            </div>
            <div onclick="handleNav(this, 'history')" class="nav-item flex items-center gap-4 p-3 rounded-xl cursor-pointer hover:bg-gray-50 transition-all">
                <i data-lucide="list"></i><span class="hidden lg:block font-semibold">История</span>
            </div>
            <div onclick="handleNav(this, 'dashboards')" class="nav-item flex items-center gap-4 p-3 rounded-xl cursor-pointer hover:bg-gray-50 transition-all">
                <i data-lucide="bar-chart-3"></i><span class="hidden lg:block font-semibold">Отчеты</span>
            </div>
            <div onclick="handleNav(this, 'database')" class="nav-item flex items-center gap-4 p-3 rounded-xl cursor-pointer hover:bg-gray-50 transition-all">
                <i data-lucide="database"></i><span class="hidden lg:block font-semibold">Данные</span>
            </div>
        </nav>

        <div class="pt-6 border-t mt-auto">
            <div class="flex items-center gap-3 p-2">
                <div id="avatar" class="w-10 h-10 rounded-full bg-black text-white flex items-center justify-center font-bold">U</div>
                <div class="hidden lg:block">
                    <p id="userName" class="text-sm font-bold text-gray-900">Загрузка...</p>
                    <button onclick="logout()" class="text-[10px] text-red-500 font-bold uppercase hover:underline">Выйти</button>
                </div>
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col bg-white">
        <header class="h-20 border-b flex items-center justify-between px-8">
            <h2 id="screen-title" class="text-xl font-bold text-gray-800 tracking-tight">Чат-аналитик</h2>
            <div class="flex items-center gap-2">
                <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                <span class="text-xs font-bold text-gray-400 uppercase tracking-widest">PostgreSQL Connected</span>
            </div>
        </header>

        <section id="main-content" class="flex-1 flex flex-col overflow-hidden relative">
            </section>
    </main>

    <aside class="hidden xl:flex w-80 bg-gray-50 border-l flex-col p-8" id="right-panel">
        </aside>

    <script src="app.js"></script>

    <script>
        // Небольшой патч для app.js прямо тут, чтобы main экран подгружал баннер
        const originalShowScreen = window.showScreen;
        window.showScreen = function(type) {
            if (type === 'main') {
                const main = document.getElementById('main-content');
                const title = document.getElementById('screen-title');
                title.innerText = "Аналитический чат";
                main.innerHTML = `
                    <div class="px-6 pt-6">
                        <img src="analitycs_for_all.png" alt="Analytics for all" class="w-full h-48 object-cover rounded-3xl shadow-sm border border-gray-100">
                    </div>
                    
                    <div class="chat-container" id="chatMessages">
                        <div class="bot-message message shadow-sm">Привет! Я готов проанализировать ваши данные. С чего начнем?</div>
                    </div>
                    
                    <div class="p-6 bg-white border-t mt-auto">
                        <div class="flex gap-4 max-w-4xl mx-auto">
                            <input id="queryInput" type="text" placeholder="Напишите запрос (например, выручка по городам)..." 
                                   class="flex-1 bg-gray-100 p-4 rounded-2xl outline-none ring-[#A5F52C] focus:ring-2 transition-all">
                            <button onclick="sendQuery()" class="bg-[#A5F52C] px-6 rounded-2xl flex items-center justify-center shadow-lg hover:scale-105 active:scale-95 transition-all">
                                <i data-lucide="zap" class="text-black"></i>
                            </button>
                        </div>
                    </div>
                `;
                document.getElementById('right-panel').innerHTML = renderQuickActions();
                setupChatListeners();
                lucide.createIcons();
            } else {
                originalShowScreen(type);
            }
        }
    </script>
</body>
</html>
