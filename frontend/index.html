<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drivee Analytics | Платформа управления данными</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .nav-item { color: #9CA3AF; transition: all 0.2s; }
        .nav-item.active { background-color: #F3F4F6; color: #111827; }
        .nav-item:hover:not(.active) { color: #111827; background-color: #F9FAFB; }
        
        .chat-container { scroll-behavior: smooth; }
        .message { max-width: 80%; padding: 1.25rem; border-radius: 1.5rem; margin-bottom: 1.5rem; line-height: 1.6; }
        .user-message { background-color: #A5F52C; color: black; align-self: flex-end; border-bottom-right-radius: 0.25rem; box-shadow: 0 4px 15px rgba(165, 245, 44, 0.15); }
        .bot-message { background-color: white; color: #1F2937; align-self: flex-start; border-bottom-left-radius: 0.25rem; border: 1px solid #F3F4F6; box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
        
        /* Скрытие скроллбара, но сохранение функционала */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-[#FBFBFB] flex h-screen overflow-hidden">

    <aside class="w-64 bg-white border-r border-gray-100 flex flex-col p-6 shadow-sm">
        <div class="flex items-center gap-3 mb-10 px-2">
            <div class="w-9 h-9 bg-[#A5F52C] rounded-xl flex items-center justify-center shadow-sm">
                <i data-lucide="database" class="w-5 h-5 text-black"></i>
            </div>
            <span class="font-bold text-xl tracking-tight">Drivee <span class="text-gray-300 font-medium">Data</span></span>
        </div>

        <nav class="space-y-2 flex-1">
            <button onclick="handleNav(this, 'main')" class="nav-item active w-full flex items-center gap-3 px-4 py-3 rounded-xl">
                <i data-lucide="message-square" class="w-5 h-5"></i> <span class="font-semibold text-sm">Аналитик</span>
            </button>
            <button onclick="handleNav(this, 'history')" class="nav-item w-full flex items-center gap-3 px-4 py-3 rounded-xl">
                <i data-lucide="history" class="w-5 h-5"></i> <span class="font-semibold text-sm">История</span>
            </button>
            <button onclick="handleNav(this, 'database')" class="nav-item w-full flex items-center gap-3 px-4 py-3 rounded-xl">
                <i data-lucide="layout-grid" class="w-5 h-5"></i> <span class="font-semibold text-sm">Заказы</span>
            </button>
            <button onclick="handleNav(this, 'dashboards')" class="nav-item w-full flex items-center gap-3 px-4 py-3 rounded-xl">
                <i data-lucide="pie-chart" class="w-5 h-5"></i> <span class="font-semibold text-sm">Графики</span>
            </button>
        </nav>

        <div class="mt-auto p-4 bg-gray-50 rounded-2xl flex items-center gap-3 border border-gray-100">
            <div id="avatar" class="w-10 h-10 bg-[#A5F52C] rounded-full flex items-center justify-center font-bold text-sm shadow-sm">A</div>
            <div class="overflow-hidden">
                <p id="userName" class="text-xs font-bold truncate text-gray-800">Admin</p>
                <button onclick="logout()" class="text-[10px] text-red-400 font-bold hover:text-red-600 uppercase tracking-wider">Выйти</button>
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col relative overflow-hidden">
        <header class="h-20 bg-white border-b border-gray-100 flex items-center justify-between px-10">
            <h2 id="screen-title" class="font-bold text-lg text-gray-800 tracking-tight">Аналитический чат</h2>
            <div class="flex items-center gap-4">
                <div class="flex items-center gap-2">
                    <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                    <span class="text-[11px] text-gray-400 font-bold uppercase tracking-widest">Система готова</span>
                </div>
            </div>
        </header>

        <div id="main-content" class="flex-1 flex flex-col overflow-hidden">
            </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
