<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drivee Analytics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #F9FAFB; }
        .message { max-width: 80%; padding: 1rem; border-radius: 1.5rem; margin-bottom: 1rem; }
        .user-message { background-color: #A5F52C; color: black; align-self: flex-end; border-bottom-right-radius: 0.2rem; }
        .bot-message { background-color: white; color: #1F2937; align-self: flex-start; border-bottom-left-radius: 0.2rem; border: 1px solid #E5E7EB; }
        .chat-container { display: flex; flex-direction: column; height: calc(100vh - 200px); overflow-y: auto; padding: 1.5rem; }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <aside class="w-20 lg:w-64 bg-white border-r flex flex-col items-center lg:items-start py-8 px-4 transition-all">
        <div class="flex items-center gap-3 px-2 mb-10">
            <div class="w-10 h-10 bg-[#A5F52C] rounded-xl flex items-center justify-center font-bold text-xl">D</div>
            <span class="font-bold text-xl hidden lg:block">Drivee Pay</span>
        </div>

        <nav class="flex-1 w-full space-y-2">
            <div onclick="handleNav(this, 'main')" class="nav-item active flex items-center gap-4 p-3 rounded-xl cursor-pointer hover:bg-gray-50 transition-all text-gray-500 hover:text-black">
                <i data-lucide="layout-dashboard"></i><span class="hidden lg:block font-semibold">Чат-аналитик</span>
            </div>
            <div onclick="handleNav(this, 'history')" class="nav-item flex items-center gap-4 p-3 rounded-xl cursor-pointer hover:bg-gray-50 transition-all text-gray-500">
                <i data-lucide="history"></i><span class="hidden lg:block font-semibold">История</span>
            </div>
            <div onclick="handleNav(this, 'dashboards')" class="nav-item flex items-center gap-4 p-3 rounded-xl cursor-pointer hover:bg-gray-50 transition-all text-gray-500">
                <i data-lucide="pie-chart"></i><span class="hidden lg:block font-semibold">Дашборды</span>
            </div>
            <div onclick="handleNav(this, 'database')" class="nav-item flex items-center gap-4 p-3 rounded-xl cursor-pointer hover:bg-gray-50 transition-all text-gray-500">
                <i data-lucide="database"></i><span class="hidden lg:block font-semibold">База данных</span>
            </div>
        </nav>

        <div class="w-full pt-6 border-t mt-auto">
            <div class="flex items-center gap-3 p-2 bg-gray-50 rounded-2xl">
                <div id="avatar" class="w-10 h-10 rounded-full bg-black text-white flex items-center justify-center font-bold">A</div>
                <div class="hidden lg:block">
                    <p id="userName" class="text-xs font-bold text-gray-900">User</p>
                    <button onclick="logout()" class="text-[10px] text-red-500 font-bold hover:underline">Выйти</button>
                </div>
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col min-w-0">
        <header class="h-20 bg-white border-b flex items-center justify-between px-8">
            <h2 id="screen-title" class="text-xl font-bold text-gray-800">Аналитический чат</h2>
            <div class="flex items-center gap-4">
                <span class="px-3 py-1 bg-green-50 text-green-600 rounded-full text-[10px] font-bold uppercase tracking-wider">Система активна</span>
            </div>
        </header>

        <section id="main-content" class="flex-1 overflow-hidden relative">
            </section>
    </main>

    <aside class="hidden xl:flex w-80 bg-gray-50 border-l flex-col p-8" id="right-panel">
        </aside>

    <script src="app.js"></script>
    <style>
        .nav-item.active { background-color: #f3f4f6; color: black; }
        .nav-item.active i { color: #A5F52C; }
    </style>
</body>
</html>
