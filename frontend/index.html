<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Драйвиум — Аналитическая платформа</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { background-color: #F9FAFB; font-family: 'Inter', sans-serif; color: #2D2D2D; margin: 0; }
        
        /* Сайдбар */
        .sidebar { width: 260px; border-right: 1px solid #E5E7EB; background: white; flex-shrink: 0; }
        .nav-item { display: flex; align-items: center; gap: 12px; padding: 10px 16px; border-radius: 12px; transition: all 0.2s; color: #6B7280; font-weight: 500; font-size: 14px; cursor: pointer; }
        .nav-item:hover { background: #F3F4F6; color: #111827; }
        .nav-item.active { background: #E9F7D0; color: #111827; font-weight: 600; }
        
        /* Чат */
        .chat-container { max-height: calc(100vh - 220px); overflow-y: auto; display: flex; flex-direction: column-reverse; /* Сообщения растут снизу */ }
        .message { padding: 14px 18px; border-radius: 18px; margin-bottom: 14px; max-width: 80%; line-height: 1.6; font-size: 14px; }
        .user-message { background: #E9F7D0; align-self: flex-end; color: #111827; border-radius: 18px 18px 4px 18px; }
        .bot-message { background: white; border: 1px solid #E5E7EB; align-self: flex-start; color: #1F2937; border-radius: 18px 18px 18px 4px; box-shadow: 0 1px 2px rgba(0,0,0,0.03); }
        
        /* Правая колонка и Карточки */
        .right-panel { width: 320px; border-left: 1px solid #E5E7EB; background: white; flex-shrink: 0; }
        .card { background: white; border: 1px solid #E5E7EB; border-radius: 16px; transition: all 0.2s; }
        .action-card { cursor: pointer; }
        .action-card:hover { border-color: #A5F52C; background: #FBFDF6; }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <aside class="sidebar flex flex-col p-5 h-full">
        <div class="mb-10 flex items-center gap-2.5">
            <img src="logo.png" alt="Drivee" class="h-7 w-auto">
            <span class="text-lg font-bold tracking-tight text-gray-950">Драйвиум</span>
        </div>
        
        <button onclick="showScreen('main')" class="w-full bg-white border border-gray-200 py-3 rounded-xl font-semibold mb-7 flex items-center justify-center gap-2 hover:bg-gray-50 active:scale-[0.98] transition-all text-sm">
            <i data-lucide="plus-circle" class="w-4 h-4"></i> Новый запрос
        </button>

        <nav class="space-y-1.5 flex-1">
            <div class="nav-item active" onclick="handleNav(this, 'main')"><i data-lucide="home" class="w-4 h-4"></i> <span>Главная</span></div>
            <div class="nav-item" onclick="handleNav(this, 'history')"><i data-lucide="clock" class="w-4 h-4"></i> <span>История запросов</span></div>
            <div class="nav-item" onclick="handleNav(this, 'dashboards')"><i data-lucide="layout-dashboard" class="w-4 h-4"></i> <span>Дашборды</span></div>
            <div class="nav-item" onclick="handleNav(this, 'database')"><i data-lucide="database" class="w-4 h-4"></i> <span>База данных</span></div>
            <div class="nav-item" onclick="handleNav(this, 'settings')"><i data-lucide="settings" class="w-4 h-4"></i> <span>Настройки</span></div>
        </nav>

        <div class="mt-auto pt-5 border-t border-gray-100 space-y-1.5">
             <div class="nav-item"><i data-lucide="help-circle" class="w-4 h-4"></i> <span>Помощь</span></div>
             <div class="nav-item text-red-600 hover:bg-red-50"><i data-lucide="log-out" class="w-4 h-4"></i> <span>Выйти</span></div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-screen overflow-hidden bg-white">
        
        <header class="h-16 flex items-center justify-between px-8 border-b border-gray-100 flex-shrink-0">
            <div class="flex items-center gap-3 text-sm font-medium text-gray-500">
                <i data-lucide="sparkles" class="w-4 h-4 text-[#A5F52C]"></i>
                Драйвиум — Интеллектуальная аналитическая платформа
            </div>
            
            <div class="flex items-center gap-3">
                <div id="avatar" class="w-8 h-8 bg-[#A5F52C] rounded-full flex items-center justify-center font-bold text-xs text-black">A</div>
                <span id="userName" class="text-sm font-medium text-gray-900">admin</span>
                <i data-lucide="chevron-down" class="w-4 h-4 text-gray-400"></i>
            </div>
        </header>

        <div id="chat-content-area" class="flex-1 flex flex-col overflow-hidden bg-[#F9FAFB]">
            </div>
    </main>

    <aside id="right-panel-area" class="right-panel flex flex-col p-6 h-full overflow-y-auto">
        </aside>

    <input type="file" id="fileInput" class="hidden" onchange="handleFileUpload(this)">
    <script src="app.js"></script>
</body>
</html>
