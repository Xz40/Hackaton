<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Драйвиум — Интеллектуальная аналитическая платформа</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #FBFBFB; color: #2D2D2D; }
        
        /* Стили сайдбара */
        .sidebar { width: 280px; background: #FBFBFB; border-right: 1px solid rgba(0,0,0,0.05); display: flex; flex-direction: column; }
        .nav-item { 
            display: flex; align-items: center; gap: 12px; padding: 12px 16px; 
            border-radius: 12px; cursor: pointer; color: #5F6368; font-size: 14px; font-weight: 500;
            transition: all 0.2s;
        }
        .nav-item:hover { background: #F1F3F4; color: #2D2D2D; }
        .nav-item.active { background: #E8F5E9; color: #2E7D32; } /* Светло-зеленый фон для активного пункта */
        
        /* Кнопка "Новый запрос" */
        .btn-new-query {
            border: 1px solid #DADCE0; border-radius: 12px; padding: 12px;
            display: flex; align-items: center; gap: 10px; width: 100%;
            font-size: 14px; margin-bottom: 24px; background: white;
        }

        /* Промо-блок внизу */
        .promo-block {
            margin-top: auto; padding: 16px;
        }
        .promo-card {
            border-radius: 16px; overflow: hidden; cursor: pointer;
            transition: transform 0.2s;
        }
        .promo-card:hover { transform: translateY(-2px); }

        /* Контейнер чата */
        .chat-area { flex: 1; display: flex; flex-direction: column; background: white; border-radius: 32px 0 0 0; border: 1px solid rgba(0,0,0,0.05); }
        .message-bubble { max-width: 85%; padding: 16px 24px; border-radius: 24px; margin-bottom: 16px; font-size: 15px; line-height: 1.5; }
        .user-bubble { background: #F1F3F4; color: #2D2D2D; align-self: flex-end; border-bottom-right-radius: 4px; }
        .bot-bubble { background: white; border: 1px solid #F1F3F4; align-self: flex-start; border-bottom-left-radius: 4px; }

        /* Поле ввода как на макете */
        .input-container {
            border: 1px solid #DADCE0; border-radius: 24px; padding: 12px 16px;
            display: flex; align-items: center; gap: 12px; background: white;
            box-shadow: 0 4px 20px rgba(0,0,0,0.03);
        }
        .query-input { flex: 1; border: none; outline: none; font-size: 16px; color: #2D2D2D; }
        .btn-send { background: #A5F52C; width: 48px; height: 48px; border-radius: 16px; display: flex; items-center: center; justify-content: center; }
        
        .action-chip {
            padding: 8px 16px; border: 1px solid #F1F3F4; border-radius: 12px;
            font-size: 13px; color: #5F6368; display: flex; align-items: center; gap: 6px;
            cursor: pointer; transition: background 0.2s;
        }
        .action-chip:hover { background: #F9FAFB; }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <aside class="sidebar p-6">
        <div class="mb-10 px-2">
            <img src="logo.png" alt="Drivee" class="h-9">
        </div>

        <button class="btn-new-query">
            <i data-lucide="edit-3" class="w-5 h-5 text-gray-400"></i>
            <span>Новый запрос</span>
        </button>

        <nav class="space-y-1">
            <div onclick="handleNav(this, 'main')" class="nav-item active">
                <i data-lucide="home" class="w-5 h-5"></i><span>Главная</span>
            </div>
            <div onclick="handleNav(this, 'history')" class="nav-item">
                <i data-lucide="clock" class="w-5 h-5"></i><span>История запросов</span>
            </div>
            <div class="nav-item">
                <i data-lucide="star" class="w-5 h-5"></i><span>Избранное</span>
            </div>
            <div onclick="handleNav(this, 'dashboards')" class="nav-item">
                <i data-lucide="layout" class="w-5 h-5"></i><span>Дашборды</span>
            </div>
            <div onclick="handleNav(this, 'database')" class="nav-item">
                <i data-lucide="database" class="w-5 h-5"></i><span>База данных</span>
            </div>
            <div class="nav-item">
                <i data-lucide="settings" class="w-5 h-5"></i><span>Настройки</span>
            </div>
        </nav>

        <div class="mt-10 pt-6 border-t border-gray-100 space-y-1">
            <div class="nav-item"><i data-lucide="help-circle" class="w-5 h-5"></i><span>Помощь</span></div>
            <div onclick="logout()" class="nav-item"><i data-lucide="log-out" class="w-5 h-5"></i><span>Выйти</span></div>
        </div>

        <div class="promo-block">
            <img src="analitycs_for_all.png" alt="Аналитика доступна каждому" class="promo-card w-full object-cover">
        </div>
    </aside>

    <main class="flex-1 flex flex-col">
        <header class="h-20 flex items-center justify-between px-8">
            <div class="flex items-center gap-3">
                <div class="w-6 h-6 text-green-500">
                    <i data-lucide="sparkles" class="w-6 h-6"></i>
                </div>
                <h1 class="text-lg font-bold">Драйвиум — Интеллектуальная аналитическая платформа</h1>
            </div>
            
            <div class="flex items-center gap-4">
                <div class="flex items-center gap-2 cursor-pointer hover:opacity-80 transition-opacity">
                    <div id="avatar" class="w-10 h-10 rounded-full bg-[#A5F52C] flex items-center justify-center font-bold text-sm">Ж</div>
                    <span id="userName" class="font-medium text-sm">Жанна</span>
                    <i data-lucide="chevron-down" class="w-4 h-4 text-gray-400"></i>
                </div>
            </div>
        </header>

        <div class="flex-1 flex overflow-hidden">
            <section class="chat-area shadow-[0_-10px_40px_rgba(0,0,0,0.02)]">
                <div id="main-content" class="flex-1 overflow-y-auto p-10 flex flex-col">
                    </div>

                <div class="p-8">
                    <div class="max-w-4xl mx-auto space-y-4">
                        <div class="input-container">
                            <input id="queryInput" type="text" placeholder="Напишите ваш запрос..." class="query-input">
                            <button onclick="sendQuery()" class="btn-send shadow-lg hover:brightness-105 transition-all">
                                <i data-lucide="send" class="w-5 h-5 text-black"></i>
                            </button>
                        </div>
                        <div class="flex gap-3 justify-start">
                            <div class="action-chip"><i data-lucide="sparkles" class="w-4 h-4"></i> Примеры запросов</div>
                            <div class="action-chip"><i data-lucide="upload-cloud" class="w-4 h-4"></i> Загрузить файл</div>
                        </div>
                    </div>
                </div>
            </section>

            <aside id="right-panel" class="w-[320px] p-8 hidden xl:block">
                </aside>
        </div>
    </main>

    <script src="app.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
