<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drivee Analytics | AI</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

<div class="app-container">
    <aside class="sidebar">
        <div class="sidebar-top">
            <div class="logo-box">
                <img src="logo.png" alt="Drivee" class="main-logo">
            </div>

            <button class="btn-new" onclick="clearChat(); showView('Главная')">
                <i data-lucide="plus"></i> <span>Новый запрос</span>
            </button>

            <nav class="nav">
                <div class="nav-item active" onclick="showView('Главная')">
                    <i data-lucide="layout-dashboard"></i> <span>Главная</span>
                </div>
                <div class="nav-item" onclick="showView('История')">
                    <i data-lucide="history"></i> <span>История</span>
                </div>
                <div class="nav-item" onclick="showView('Данные')">
                    <i data-lucide="database"></i> <span>Данные</span>
                </div>
            </nav>
        </div>

        <div class="sidebar-bottom">
            <div class="logout" onclick="logout()">
                <i data-lucide="log-out"></i> <span>Выйти</span>
            </div>
            <div class="promo-wrapper">
                <img src="promo_block.png" alt="Promo" class="promo-img">
            </div>
        </div>
    </aside>

    <main class="main-content">
        <header class="header">
            <img src="header.png" alt="" class="header-bg">
            <div class="header-content">
                <div class="user-block">
                    <div class="avatar" id="avatar">A</div>
                    <span class="user-name" id="userName">Admin</span>
                </div>
            </div>
        </header>

        <div class="workspace">
            <section class="view-section" id="mainView">
                <div class="chat-viewport" id="chatMessages"></div>
                <div class="chat-footer">
                    <div class="input-container">
                        <textarea id="queryInput" placeholder="Спросите AI о данных Drivee..." rows="1"></textarea>
                        <div class="input-actions">
                            <span class="engine-tag" id="engineTag"><i data-lucide="zap"></i> DRIVEE AI</span>
                            <select id="llmProvider" style="background:#1f1f1f;color:#fff;border:1px solid rgba(255,255,255,0.15);border-radius:8px;padding:6px 8px;font-size:12px;">
                                <option value="ollama">SQLCoder (Ollama)</option>
                            </select>
                            <button class="send-btn" onclick="setLlmProvider()" title="Сменить модель" style="width:auto;padding:0 10px;">
                                AI
                            </button>
                            <button class="send-btn" onclick="sendQuery()">
                                <i data-lucide="arrow-up"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </section>

            <section id="historyView" class="view-section hidden">
                <div class="scroll-container">
                    <h2 class="page-title">История запросов</h2>
                    <div class="cards-stack" id="historyList"></div>
                </div>
            </section>

            <section id="dataView" class="view-section hidden">
                <div class="scroll-container">
                    <h2 class="page-title">Базы данных</h2>
                    <div class="cards-stack" id="dbList"></div>
                </div>
            </section>

            <aside class="right-panel">
                <div class="info-card">
                    <div class="card-label">АНАЛИТИКА</div>
                    <div class="info-val" id="statRequests">Запросов: 0</div>
                    <div class="info-val">Точность: 98%</div>
                </div>
                <div class="info-card">
                    <div class="card-label">СИСТЕМА</div>
                    <div class="status-box">
                        <span class="status-dot"></span>
                        SQL Engine Online
                    </div>
                </div>
            </aside>
        </div>
    </main>
</div>
<script src="app.js"></script>
</body>
</html>
