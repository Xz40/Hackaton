<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Драйвиум</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <div class="app-container">
    <main class="main-content">
        </main>

    <aside class="right-panel">
        <div class="side-box">
            <h3>Быстрые действия</h3>
            <div class="box-content">
                <button class="action-item"><i data-lucide="bar-chart"></i> Графики</button>
                <button class="action-item"><i data-lucide="download"></i> Экспорт</button>
            </div>
        </div>

        <div class="side-box">
            <h3>Популярные запросы</h3>
            <div class="box-content">
                <p onclick="document.getElementById('queryInput').value='Топ заказов за неделю'">📈 Топ заказов за неделю</p>
                <p onclick="document.getElementById('queryInput').value='Отмены по городам'">📍 Отмены по городам</p>
            </div>
        </div>
    </aside>
</div>
        <aside class="sidebar">
            <div class="sidebar-top">
                <div class="logo-wrapper">
                    <img src="logo.png" alt="Drivee">
                </div>
                
                <button class="btn-new" onclick="clearChat()">
                    <i data-lucide="plus" class="w-4 h-4"></i>
                    <span>Новый запрос</span>
                </button>

                <nav class="nav">
                    <div class="nav-item active"><i data-lucide="home"></i> Главная</div>
                    <div class="nav-item"><i data-lucide="history"></i> История</div>
                    <div class="nav-item"><i data-lucide="database"></i> Данные</div>
                </nav>
            </div>

            <div class="sidebar-bottom">
                <div class="logout" onclick="logout()">
                    <i data-lucide="log-out"></i> Выйти
                </div>

                <div class="promo-wrapper">
                    <img src="analitycs_for_all.png" alt="Promo">
                </div>
            </div>
        </aside>

        <main class="main-content">
            <header class="header">
                <div class="header-content"></div> 
                <div class="user-block">
                    <div id="avatar" class="avatar">?</div>
                    <span id="userName">...</span>
                </div>
            </header>

            <div id="chatMessages" class="chat-viewport"></div>

            <footer class="footer">
                <div class="input-card">
                    <textarea id="queryInput" placeholder="Напишите ваш запрос..."></textarea>
                    <div class="input-actions">
                        <span class="engine-info">SQL AI ENGINE V1.2</span>
                        <button class="send-btn" onclick="sendQuery()">
                            <i data-lucide="arrow-up-right"></i>
                        </button>
                    </div>
                </div>
            </footer>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
