<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drivee - Вход</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap');
        body { 
            background-color: #f4f4f4; 
            font-family: 'Inter', sans-serif; 
        }
        .header-link { color: #2D2D2D; font-weight: 500; font-size: 18px; }
        .login-card { 
            background: white; 
            border-radius: 40px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        }
        .green-banner {
            background-color: #A5F52C;
            border-radius: 30px;
            position: relative;
            overflow: hidden;
        }
        .input-field {
            background-color: #F5F5F5;
            border-radius: 18px;
            padding: 20px;
            width: 100%;
            outline: none;
            border: 2px solid transparent;
            transition: all 0.2s;
        }
        .input-field:focus { border-color: #A5F52C; background-color: white; }
        .btn-submit {
            background-color: #A5F52C;
            border-radius: 18px;
            padding: 20px;
            width: 100%;
            font-weight: 800;
            color: #2D2D2D;
            transition: transform 0.1s;
        }
        .btn-submit:active { transform: scale(0.98); }
        .heart-icon {
            position: absolute;
            bottom: -20px;
            right: 10px;
            width: 220px;
            opacity: 0.4;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <header class="w-full py-6 px-10 flex items-center justify-between max-w-7xl mx-auto">
        <div class="flex items-center gap-12">
            <img src="logo.png" alt="Drivee" class="h-10 w-auto">
            <nav class="hidden md:flex gap-8">
                <a href="#" class="header-link flex items-center gap-1">Пассажирам <span class="text-xs">▼</span></a>
                <a href="#" class="header-link flex items-center gap-1">Водителям <span class="text-xs">▼</span></a>
                <a href="#" class="header-link">Партнёрам</a>
                <a href="#" class="header-link flex items-center gap-1">О нас <span class="text-xs">▼</span></a>
            </nav>
        </div>
    </header>

    <main class="flex-1 flex items-center justify-center p-4">
        <div class="login-card flex flex-col md:flex-row p-6 gap-8 max-w-5xl w-full">
            
            <div class="green-banner flex-1 p-10 min-h-[400px] flex flex-col">
                <h1 class="text-[44px] font-extrabold text-[#2D2D2D] leading-[1.1] z-10">
                    Стань частью<br>команды в Drivee
                </h1>
                
                <svg class="heart-icon" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M100 160C100 160 30 110 30 65C30 40 50 25 70 25C85 25 95 35 100 45C105 35 115 25 130 25C150 25 170 40 170 65C170 110 100 160 100 160Z" stroke="white" stroke-width="12" stroke-linejoin="round"/>
                </svg>
            </div>

            <div class="flex-1 flex flex-col justify-center px-4 py-8">
                <div class="space-y-4">
                    <input id="username" type="text" placeholder="Логин" class="input-field text-lg">
                    <input type="password" placeholder="Пароль" class="input-field text-lg">
                    
                    <div class="flex items-center gap-3 py-2">
                        <input type="checkbox" id="remember" class="w-5 h-5 accent-[#A5F52C] rounded">
                        <label for="remember" class="text-gray-500 text-sm">Запомнить меня на этом устройстве</label>
                    </div>

                    <button onclick="login()" class="btn-submit text-xl shadow-lg shadow-green-200">
                        Войти в профиль
                    </button>
                </div>
            </div>

        </div>
    </main>

    <script>
        function login() {
            const user = document.getElementById('username').value;
            if (!user) return alert('Введите логин!');
            localStorage.setItem('drivee_user', user);
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
