<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drivee - Вход</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap');
        
        body { 
            background-color: #FBFBFB; /* Тот самый цвет фона из пипетки */
            font-family: 'Inter', sans-serif; 
            margin: 0;
        }

        /* Линия под заголовком как на оригинале */
        header {
            border-bottom: 1px solid rgba(0, 0, 0, 0.08); /* Тонкая полоска */
            background-color: #FBFBFB;
        }

        .header-link { color: #2D2D2D; font-weight: 500; font-size: 16px; transition: opacity 0.2s; }
        .header-link:hover { opacity: 0.7; }
        
        /* Выпадающее меню О нас */
        .dropdown { 
            position: relative; 
            display: inline-block; 
            padding-bottom: 20px; 
            margin-bottom: -20px;
        }
        .dropdown-content {
            display: none;
            position: absolute;
            background-color: white;
            min-width: 240px;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.08);
            z-index: 50;
            border-radius: 16px;
            padding: 10px 0;
            top: 40px;
            left: 0;
            border: 1px solid rgba(0,0,0,0.05);
        }
        .dropdown-content a {
            color: #2D2D2D;
            padding: 12px 20px;
            text-decoration: none;
            display: block;
            font-size: 15px;
            font-weight: 500;
        }
        .dropdown-content a:hover { background-color: #f9f9f9; color: #A5F52C; }
        .dropdown:hover .dropdown-content { display: block; animation: fadeIn 0.2s ease; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Карточка входа */
        .login-card { 
            background: white; 
            border-radius: 40px; 
            box-shadow: 0 4px 25px rgba(0,0,0,0.1);
        }
        .green-banner {
            background-color: #A5F52C;
            border-radius: 30px;
            position: relative;
            overflow: hidden;
        }
        .input-field {
            background-color: #F5F5F5;
            border-radius: 18px;
            padding: 20px;
            width: 100%;
            outline: none;
            border: 2px solid transparent;
        }
        .input-field:focus { border-color: #A5F52C; background-color: white; }
        .btn-submit {
            background-color: #A5F52C;
            border-radius: 18px;
            padding: 20px;
            width: 100%;
            font-weight: 800;
            color: #2D2D2D;
        }
        .btn-driver {
            background-color: #A5F52C;
            border-radius: 14px;
            padding: 10px 24px;
            font-weight: 700;
            font-size: 14px;
            transition: all 0.2s;
        }
        .btn-driver:hover { brightness: 105%; }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <header class="w-full">
        <div class="py-4 px-8 flex items-center justify-between max-w-7xl mx-auto">
            <div class="flex items-center gap-10">
                <img src="logo.png" alt="Drivee" class="h-9 w-auto"> <nav class="flex gap-8 items-center">
                    <a href="https://drivee.com/partnership" target="_blank" class="header-link">Партнёрам</a>
                    
                    <div class="dropdown">
                        <button class="header-link flex items-center gap-1 outline-none">
                            О нас <span class="text-[10px] opacity-40">▼</span>
                        </button>
                        <div class="dropdown-content">
                            <a href="https://drivee.com/about-us" target="_blank">О компании</a>
                            <a href="https://drivee.com/sustainability" target="_blank">Устойчивое развитие</a>
                            <a href="https://drivee.com/support" target="_blank">Служба поддержки</a>
                            <a href="https://drivee.com/blog" target="_blank">Блог</a>
                            <a href="https://drivee.com/vacancy" target="_blank">Вакансии</a>
                        </div>
                    </div>
                </nav>
            </div>

            <a href="https://drivee.com/driver" target="_blank" class="btn-driver">
                Стать водителем
            </a>
        </div>
    </header>

    <main class="flex-1 flex items-center justify-center p-4">
        <div class="login-card flex flex-col md:flex-row p-5 gap-8 max-w-5xl w-full">
            
            <div class="green-banner flex-1 p-10 min-h-[420px] flex flex-col justify-between">
                <h1 class="text-[44px] font-extrabold text-[#2D2D2D] leading-[1.1] z-10">
                    Стань частью<br>команды в Drivee
                </h1>
                
                <div class="relative h-32 w-full flex justify-end items-end opacity-30">
                    <svg width="180" height="180" viewBox="0 0 200 200" fill="none">
                        <path d="M100 160C100 160 30 110 30 65C30 40 50 25 70 25C85 25 95 35 100 45C105 35 115 25 130 25C150 25 170 40 170 65C170 110 100 160 100 160Z" stroke="white" stroke-width="12" stroke-linejoin="round"/>
                    </svg>
                </div>
            </div>

            <div class="flex-1 flex flex-col justify-center px-4 py-8">
                <div class="space-y-4">
                    <input id="username" type="text" placeholder="Логин" class="input-field text-lg">
                    <input type="password" placeholder="Пароль" class="input-field text-lg">
                    
                    <div class="flex items-center gap-3 py-2">
                        <input type="checkbox" id="remember" class="w-5 h-5 accent-[#A5F52C] rounded">
                        <label for="remember" class="text-gray-500 text-sm cursor-pointer">Запомнить меня на этом устройстве</label>
                    </div>

                    <button onclick="login()" class="btn-submit text-xl hover:brightness-105 transition-all">
                        Войти в профиль
                    </button>
                </div>
            </div>

        </div>
    </main>

    <script>
        function login() {
            const user = document.getElementById('username').value;
            if (!user) {
                alert('Введите логин!');
                return;
            }
            localStorage.setItem('drivee_user', user);
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
