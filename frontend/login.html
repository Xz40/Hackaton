<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Drivee - Вход</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-[#1A1A1A] flex items-center justify-center min-h-screen font-sans p-4">
    <div class="bg-white rounded-[40px] p-6 md:p-12 flex flex-col md:flex-row gap-8 max-w-5xl w-full border border-gray-800">
        <div class="bg-[#A5F52C] rounded-[32px] p-10 flex-1 flex flex-col justify-between min-h-[350px] relative overflow-hidden border-2 border-[#8ed426]">
            <h1 class="text-4xl font-bold text-[#2D2D2D] leading-tight z-10">Стань частью<br>команды в Drivee</h1>
            <i data-lucide="shield-check" class="absolute bottom-[-20px] right-[-20px] w-48 h-48 text-[#8ed426] opacity-30"></i>
        </div>
        <div class="flex-1 flex flex-col justify-center px-4">
            <div class="mb-10 text-2xl font-bold italic">drive<span class="text-[#A5F52C]">ee</span></div>
            <div class="space-y-4">
                <input id="username" type="text" placeholder="Логин" class="w-full bg-gray-100 p-5 rounded-2xl outline-none border-2 border-transparent focus:border-[#A5F52C] transition-all">
                <input type="password" placeholder="Пароль" class="w-full bg-gray-100 p-5 rounded-2xl outline-none border-2 border-transparent focus:border-[#A5F52C] transition-all">
                <button onclick="login()" class="w-full bg-[#A5F52C] py-5 rounded-2xl font-bold text-[#2D2D2D] border-b-4 border-[#8ed426] hover:brightness-105 active:border-b-0 transition-all">Войти в профиль</button>
            </div>
        </div>
    </div>
    <script>
        lucide.createIcons();
        function login() {
            const user = document.getElementById('username').value;
            if (!user) return alert('Введи логин!');
            localStorage.setItem('drivee_user', user);
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
